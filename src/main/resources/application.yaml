spring:
  application:
    name: demo
  elasticsearch:
    uris: http://localhost:9280

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: '123456'
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: none
      show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  springdoc:
    swagger-ui:
      path: /minha-api.html
      operations-sorter: method
      doc-expansion: none
    api-docs:
      path: /v3/api-docs