spring:
  application:
    name: demo

datasource:
  url: jdbc:postgresql://localhost:5432/postgres
  username: postgres
  password: 123456
  driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
      show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect